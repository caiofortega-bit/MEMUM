<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMUN - Novela Visual Investigativa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PANTALLA DE INICIO (CAPA) --- */
        #cover-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
            cursor: pointer;
        }

        .minimal-m {
            font-size: 5rem;
            font-weight: 200;
            color: #fff;
            letter-spacing: -2px;
            transition: transform 0.5s ease, text-shadow 0.5s ease;
        }

        #cover-screen:hover .minimal-m {
            transform: scale(1.05);
            text-shadow: 0 0 15px rgba(73, 182, 255, 0.6);
        }

        .cover-hint {
            margin-top: 20px;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(73, 182, 255, 0.4);
            animation: breathe 3s infinite ease-in-out;
        }

        /* --- ENCABEZADO --- */
        .memun-header {
            text-align: center;
            margin-bottom: 20px;
            user-select: none;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 1s ease;
        }

        .memun-logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 10px;
            color: #fff;
            position: relative;
            display: inline-block;
            line-height: 1;
        }

        .memun-logo::before, .memun-logo::after {
            content: "MEMUN";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #050505;
        }

        .memun-logo::before { left: 2px; text-shadow: -1px 0 #49b6ff; clip: rect(44px, 450px, 56px, 0); animation: glitch-anim 5s infinite linear alternate-reverse; }
        .memun-logo::after { left: -2px; text-shadow: -1px 0 #ff4949; clip: rect(85px, 450px, 140px, 0); animation: glitch-anim2 5s infinite linear alternate-reverse; }

        .memun-slogan {
            margin-top: 8px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(73, 182, 255, 0.7);
        }

        /* --- MARCO DE LA VN --- */
        .vn-frame {
            position: relative;
            width: 100%;
            max-width: 950px;
            background-color: #090909;
            border: 1px solid rgba(73, 182, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            opacity: 0;
            transform: scale(0.99);
            transition: all 1s ease 0.2s;
        }

        body.system-ready .memun-header,
        body.system-ready .vn-frame,
        body.system-ready .nav-instructions {
            opacity: 1;
            transform: none;
        }

        /* --- CONTENEDOR DEL LIBRO RESPONSIVO --- */
        .book-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 600px;
            perspective: 2000px;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s, visibility 0.3s;
            z-index: 1;
        }

        .page:nth-child(1) { z-index: 5; }
        .page:nth-child(2) { z-index: 4; }
        .page:nth-child(3) { z-index: 3; }
        .page:nth-child(4) { z-index: 2; }
        .page:nth-child(5) { z-index: 1; }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center;
            background-color: #090909; 
            border: 1px solid rgba(73, 182, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            overflow: hidden;
        }

        .page-back {
            transform: rotateY(180deg);
            background-color: #050505; 
        }

        .page.page-hidden {
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ZONAS DE NAVEGACIÓN Y FLECHAS DE AYUDA */
        .nav-zone {
            position: absolute;
            top: 0;
            width: 25%;
            height: 100%;
            z-index: 40;
            cursor: pointer;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-zone.nav-left { left: 0; }
        .nav-zone.nav-right { right: 0; }

        /* Flechas sutiles de inactividad */
        .nav-arrow {
            font-size: 1.5rem;
            color: rgba(73, 182, 255, 0.6);
            text-shadow: 0 0 8px rgba(73, 182, 255, 0.8);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            user-select: none;
        }
        .nav-arrow.show {
            opacity: 1;
            animation: arrowBlink 1.5s infinite ease-in-out;
        }

        @keyframes arrowBlink {
            0%, 100% { transform: translateX(0); opacity: 0.3; }
            50% { transform: translateX(var(--dir)); opacity: 1; }
        }

        /* --- HOTSPOTS CON GLITCH --- */
        .interactive-hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 50%;
            border: 1px solid transparent; 
            background-color: transparent;
            z-index: 45;
            animation: hintPulseGlitch 5s infinite ease-in-out;
        }

        .interactive-hotspot:hover {
            animation: none !important;
            background-color: rgba(73, 182, 255, 0.05) !important;
            border-color: rgba(73, 182, 255, 0.9) !important;
            box-shadow: -2px 0 rgba(255,73,73,0.4), 2px 0 rgba(73,182,255,0.4);
        }

        @keyframes hintPulseGlitch {
            0%, 85%, 100% { border-color: transparent; background-color: transparent; box-shadow: none; }
            88% { border-color: rgba(73, 182, 255, 0.4); box-shadow: -1px 0 rgba(255,73,73,0.3), 1px 0 rgba(73,182,255,0.3); }
            90% { border-color: rgba(73, 182, 255, 0.6); box-shadow: 1px -1px rgba(255,73,73,0.5), -1px 1px rgba(73,182,255,0.5); }
        }

        /* Coordenadas de los Hotspots */
        #hotspot-p1 { top: 35%; left: 38%; width: 40px; height: 40px; }
        #hotspot-p2 { top: 70%; left: 20%; width: 40px; height: 40px; }
        #hotspot-p3 { top: 45%; left: 75%; width: 40px; height: 40px; }
        #hotspot-p4 { top: 15%; left: 30%; width: 40px; height: 40px; }

        /* --- POP-UP ESTILO ABRIR CARTA --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(3, 3, 3, 0.94);
            z-index: 6000;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .modal.active { display: flex; }

        .modal-envelope {
            background-color: #0d0d0d;
            border: 1px solid rgba(73, 182, 255, 0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            width: 100%;
            max-width: 440px;
            padding: 5px;
            overflow: hidden;
            position: relative;
            transform: scaleY(0.01);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal.active .modal-envelope { transform: scaleY(1); }

        .modal-content {
            background-color: #090909;
            border: 1px solid rgba(73, 182, 255, 0.1);
            padding: 30px 25px;
            width: 100%;
            transform: translateY(110%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.25s;
        }

        .modal.active .modal-content { transform: translateY(0); }

        .modal-img {
            width: 100%;
            max-height: 200px;
            border-radius: 2px;
            margin-bottom: 20px;
            object-fit: contain;
            border: 1px solid rgba(73, 182, 255, 0.1);
        }

        .modal-text {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #ccc;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 18px;
            cursor: pointer;
            color: rgba(73, 182, 255, 0.5);
            z-index: 10;
        }

        /* --- SECUENCIA DE EXPERIENCIA FINAL --- */
        #final-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            z-index: 7000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease, visibility 1.5s;
            padding: 25px;
        }

        #final-screen.active { opacity: 1; visibility: visible; }

        .final-quote {
            max-width: 500px;
            text-align: center;
            font-size: 1rem;
            line-height: 1.8;
            letter-spacing: 1px;
            color: #aaa;
            margin: 30px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 1.2s ease 1s;
        }

        .final-title {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ff4949;
            margin-bottom: 30px;
            opacity: 0;
            transition: all 1s ease 2.2s;
        }

        #final-screen.active .final-quote, #final-screen.active .final-title { opacity: 1; transform: none; }

        .restart-btn {
            background: transparent;
            border: 1px solid rgba(73, 182, 255, 0.4);
            color: #49b6ff;
            padding: 12px 25px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 2px;
            opacity: 0;
            transition: all 0.3s ease, opacity 1s ease 3.2s;
        }
        #final-screen.active .restart-btn { opacity: 1; }
        .restart-btn:hover { background-color: rgba(73, 182, 255, 0.05); border-color: #49b6ff; }

        .nav-instructions {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.2);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        @keyframes glitch-anim { 0% { clip: rect(31px, 9999px, 94px, 0); } 50% { clip: rect(118px, 9999px, 142px, 0); } 100% { clip: rect(130px, 9999px, 67px, 0); } }
        @keyframes glitch-anim2 { 0% { clip: rect(76px, 9999px, 116px, 0); } 50% { clip: rect(15px, 9999px, 82px, 0); } 100% { clip: rect(29px, 9999px, 93px, 0); } }
    </style>
</head>
<body>

    <!-- CAPA INICIAL -->
    <div id="cover-screen" onclick="unlockSystem()">
        <div class="minimal-m">M</div>
        <div class="cover-hint">Haz clic para inicializar terminal_</div>
    </div>

    <!-- TERMINAL HEADER -->
    <header class="memun-header">
        <div class="memun-logo">MEMUN</div>
        <div class="memun-slogan">El futuro es Memun. Borrar. Proteger. Reescribir.</div>
    </header>

    <!-- ÁREA CENTRAL DE LA NOVELA VISUAL -->
    <main class="vn-frame">
        <!-- ZONAS DE TOQUE E INDICADORES (SETAS) -->
        <div class="nav-zone nav-left" onclick="changePage(-1)">
            <span id="arrow-l" class="nav-arrow" style="--dir: -8px;">&#9664;</span>
        </div>
        <div class="nav-zone nav-right" onclick="changePage(1)">
            <span id="arrow-r" class="nav-arrow" style="--dir: 8px;">&#9654;</span>
        </div>

        <div class="book-container">

            <!-- PAGINA 1 -->
            <div class="page">
                <div class="page-front" style="background-image: url('https://i.imgur.com/YXJXP9K.jpeg');">
                    <div id="hotspot-p1" class="interactive-hotspot" 
                         data-text="SISTEMA MEMUN // ALERTA DE SISTEMA: Interrupción comercial activa. El software de vigilancia integrado detectó alteraciones bruscas en el estado anímico de la periodista Alice durante su intento de investigación." 
                         data-img="https://i.imgur.com/lYOV84f.png" 
                         onclick="openHotspot(this)">
                    </div>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- PAGINA 2 -->
            <div class="page">
                <div class="page-front" style="background-image: url('https://via.placeholder.com/500x700/090909/49b6ff?text=REGISTRO+02');">
                    <div id="hotspot-p2" class="interactive-hotspot" 
                         data-text="ARCHIVO DE MEMORIA ELIMINADO: No se encontraron registros recuperables para las fuentes consultadas en esta sección del edificio corporativo." 
                         data-img="https://via.placeholder.com/150/49b6ff/ffffff?text=MEMUN+DATA" 
                         onclick="openHotspot(this)">
                    </div>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- PAGINA 3 -->
            <div class="page">
                <div class="page-front" style="background-image: url('https://via.placeholder.com/500x700/090909/49b6ff?text=REGISTRO+03');">
                    <div id="hotspot-p3" class="interactive-hotspot" 
                         data-link="https://www.google.com" 
                         onclick="openHotspot(this)">
                    </div>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- PAGINA 4 -->
            <div class="page">
                <div class="page-front" style="background-image: url('https://via.placeholder.com/500x700/090909/49b6ff?text=REGISTRO+04');">
                    <div id="hotspot-p4" class="interactive-hotspot" 
                         data-text="PROTOCOLO DE SEGURIDAD INTERRUMPIDO: Los datos de rastreo y monitoreo de comportamiento de Alex han sido permanentemente bloqueados." 
                         data-img="https://via.placeholder.com/150/49b6ff/ffffff?text=ALEX+LOG" 
                         onclick="openHotspot(this)">
                    </div>
                </div>
                <div class="page-back"></div>
            </div>

            <!-- PAGINA 5 (CÉLULA DE CIERRE AUTOMÁTICO) -->
            <div class="page">
                <div class="page-front" style="background-image: url('https://via.placeholder.com/500x700/090909/ff4949?text=CÉLULA+FINAL');">
                </div>
                <div class="page-back"></div>
            </div>

        </div>
    </main>

    <footer class="nav-instructions">
        <p>PULSA EN LOS LATERALES IZQUIERDA/DERECHA PARA VOLVER O AVANZAR</p>
    </footer>

    <!-- EXPERIÊNCIA FINAL DRAMÁTICA EM ESPANHOL -->
    <div id="final-screen">
        <div class="memun-logo">MEMUN</div>
        <p class="final-quote">
            "As memórias podem ser editadas.<br>
            As marcas que elas deixam, não."
        </p>
        <div class="final-title">Fin</div>
        <button class="restart-btn" onclick="restartInvestigation()">Reiniciar investigación</button>
    </div>

    <!-- MODAL "SACAR CARTA" -->
    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-envelope" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-content">
                <img id="modalImg" class="modal-img" src="" alt="Elemento Ampliado">
                <p id="modalText" class="modal-text"></p>
            </div>
        </div>
    </div>

    <script>
        let currentPageIndex = 0;
        const pages = Array.from(document.querySelectorAll('.page'));
        let inactivityTimer;

        // Monitoreo de inactividad para mostrar flechas
        window.addEventListener('load', () => {
            updatePageLayers();
            resetInactivityTimer();
            ['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(evt => {
                document.addEventListener(evt, resetInactivityTimer);
            });
        });

        function resetInactivityTimer() {
            hideArrows();
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(showArrows, 5000); // 5 segundos de espera
        }

        function showArrows() {
            if (currentPageIndex > 0) document.getElementById('arrow-l').classList.add('show');
            if (currentPageIndex < pages.length - 1) document.getElementById('arrow-r').classList.add('show');
        }

        function hideArrows() {
            document.getElementById('arrow-l').classList.remove('show');
            document.getElementById('arrow-r').classList.remove('show');
        }

        function unlockSystem() {
            const cover = document.getElementById('cover-screen');
            cover.style.opacity = '0';
            setTimeout(() => {
                cover.style.visibility = 'hidden';
                document.body.classList.add('system-ready');
            }, 1200);
        }

        function changePage(direction) {
            // Evita voltear si se llegó al final absoluto
            if (document.getElementById('final-screen').classList.contains('active')) return;

            if (direction === 1 && currentPageIndex < pages.length - 1) {
                pages[currentPageIndex].classList.add('flipped');
                currentPageIndex++;
                
                // DISPARADOR AUTOMÁTICO: Si llegó a la última página, ejecuta la cinemática
                if (currentPageIndex === pages.length - 1) {
                    setTimeout(() => {
                        document.getElementById('final-screen').classList.add('active');
                    }, 800); // Espera que termine el flip
                }
            } else if (direction === -1 && currentPageIndex > 0) {
                currentPageIndex--;
                pages[currentPageIndex].classList.remove('flipped');
            }
            updatePageLayers();
            resetInactivityTimer();
        }

        function updatePageLayers() {
            pages.forEach((p, idx) => {
                if (p.classList.contains('flipped')) {
                    p.style.zIndex = 10 + (pages.length - idx);
                    p.classList.add('page-hidden');
                } else {
                    p.style.zIndex = pages.length - idx;
                    if (idx === currentPageIndex) {
                        p.classList.remove('page-hidden');
                    } else {
                        p.classList.add('page-hidden');
                    }
                }
            });
        }

        function openHotspot(element) {
            if (element.hasAttribute('data-link')) {
                window.open(element.getAttribute('data-link'), '_blank');
                return;
            }

            document.getElementById('modalText').innerText = element.getAttribute('data-text') || '';
            const modalImg = document.getElementById('modalImg');
            const imgSrc = element.getAttribute('data-img');

            if (imgSrc) {
                modalImg.src = imgSrc;
                modalImg.style.display = "inline-block";
            } else {
                modalImg.style.display = "none";
            }

            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('infoModal').classList.remove('active');
        }

        function restartInvestigation() {
            document.getElementById('final-screen').classList.remove('active');
            currentPageIndex = 0;
            pages.forEach((p) => {
                p.classList.remove('flipped');
            });
            setTimeout(updatePageLayers, 50);
            resetInactivityTimer();
        }
    </script>
</body>
</html>
