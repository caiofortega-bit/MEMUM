<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMUN - Novela Visual Investigativa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            padding: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- PANTALLA DE INICIO (CAPA) --- */
        #cover-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), visibility 1.2s;
            cursor: pointer;
        }

        .corporate-logo-img {
            width: 120px;
            height: auto;
            object-fit: contain;
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        #cover-screen:hover .corporate-logo-img {
            transform: scale(1.05);
            filter: drop-shadow(0 0 10px rgba(73, 182, 255, 0.6));
        }

        .cover-hint {
            margin-top: 25px;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(73, 182, 255, 0.4);
            animation: breathe 3s infinite ease-in-out;
        }

        /* --- ENCABEZADO CON LOGO GRÁFICO --- */
        .memun-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            user-select: none;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 1s ease;
        }

        .text-logo-img {
            height: 45px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 4px rgba(73, 182, 255, 0.2));
        }

        .memun-slogan {
            margin-top: 10px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: rgba(73, 182, 255, 0.7);
            font-weight: 500;
        }

        /* --- PANTALLA SELECCIÓN DE COMICS (HUB) --- */
        #comic-hub {
            display: none;
            width: 100%;
            max-width: 900px;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
            flex-direction: column;
            align-items: center;
        }

        .hub-title {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 25px;
            text-align: center;
        }

        .hub-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .hub-card {
            position: relative;
            width: 160px;
            aspect-ratio: 1 / 1.428;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(73, 182, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .hub-card:not(.unclickable-card):hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #49b6ff;
            box-shadow: 0 0 15px rgba(73, 182, 255, 0.4);
        }

        .unclickable-card {
            cursor: default;
        }

        .hub-card-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9) 80%);
            padding: 30px 10px 10px 10px;
            text-align: center;
            pointer-events: none;
        }

        .hub-card-title {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        /* --- MARCO DE LA VN --- */
        .vn-frame {
            display: none;
            position: relative;
            width: 100%;
            max-width: 440px;
            background-color: #090909;
            border: 1px solid rgba(73, 182, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            padding: 10px;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            opacity: 0;
            transform: scale(0.99);
            transition: all 0.5s ease;
        }

        /* --- SOLAPAS SUPERIORES COMPACTAS --- */
        .identity-tabs-header {
            position: absolute;
            top: -26px;
            left: 0;
            display: flex;
            gap: 4px;
            z-index: 50;
            pointer-events: auto;
        }

        .identity-tab {
            background: #090909;
            border: 1px solid rgba(73, 182, 255, 0.2);
            border-bottom: none;
            color: rgba(73, 182, 255, 0.5);
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 5px 14px;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .identity-tab.active {
            border-color: rgba(73, 182, 255, 0.5);
            color: #fff;
            background: #090909;
            box-shadow: inset 0 2px 0 #49b6ff;
        }

        /* Oculta por defecto la pestaña de Luz dentro de la lectura */
        #btn-tab-luz {
            display: none;
            border-color: rgba(255, 73, 73, 0.3);
            color: rgba(255, 73, 73, 0.6);
        }

        #btn-tab-luz.unlocked {
            display: inline-block;
        }

        .back-hub-tab {
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            margin-left: auto;
        }
        .back-hub-tab:hover {
            border-color: #49b6ff;
            color: #fff;
        }

        body.system-ready .memun-header,
        body.system-ready .nav-instructions {
            opacity: 1;
            transform: none;
        }

        /* --- CONTAINER DEL LIBRO --- */
        .book-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.428;
            perspective: 2000px;
        }

        .comic-cluster {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            display: none;
        }
        .comic-cluster.active {
            display: block;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            transform-style: preserve-3d;
            transform-origin: left center;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s, visibility 0.3s;
            z-index: 1;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #090909; 
            border: 1px solid rgba(73, 182, 255, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            border-radius: 4px;
            overflow: hidden;
        }

        .page-back {
            transform: rotateY(180deg);
            background-color: #050505; 
        }

        .page.page-hidden {
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* ZONAS DE NAVEGACIÓN */
        .nav-zone {
            position: absolute;
            top: 0;
            width: 20%;
            height: 100%;
            z-index: 40;
            cursor: pointer;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-zone.nav-left { left: 0; }
        .nav-zone.nav-right { right: 0; }

        .nav-arrow {
            font-size: 1.3rem;
            color: rgba(73, 182, 255, 0.6);
            text-shadow: 0 0 8px rgba(73, 182, 255, 0.8);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            user-select: none;
        }
        .nav-arrow.show {
            opacity: 1;
            animation: arrowBlink 1.5s infinite ease-in-out;
        }

        @keyframes arrowBlink {
            0%, 100% { transform: translateX(0); opacity: 0.3; }
            50% { transform: translateX(var(--dir)); opacity: 1; }
        }

        /* --- HOTSPOTS CON GLITCH --- */
        .interactive-hotspot {
            position: absolute;
            cursor: pointer;
            border-radius: 50%;
            border: 1px solid transparent; 
            background-color: transparent;
            z-index: 45;
            animation: hintPulseGlitch 5s infinite ease-in-out;
        }

        .interactive-hotspot:hover {
            animation: none !important;
            background-color: rgba(73, 182, 255, 0.05) !important;
            border-color: rgba(73, 182, 255, 0.9) !important;
            box-shadow: -2px 0 rgba(255,73,73,0.4), 2px 0 rgba(73,182,255,0.4);
        }

        @keyframes hintPulseGlitch {
            0%, 85%, 100% { border-color: transparent; background-color: transparent; box-shadow: none; }
            88% { border-color: rgba(73, 182, 255, 0.4); box-shadow: -1px 0 rgba(255,73,73,0.3), 1px 0 rgba(73, 182, 255, 0.3); }
            90% { border-color: rgba(73, 182, 255, 0.6); box-shadow: -1px 1px rgba(255,73,73,0.5), -1px 1px rgba(73, 182, 255, 0.5); }
        }

        /* Coordenadas de los Hotspots */
        .comic-cluster#main-comic-cluster #hotspot-p1 { top: 10%; left: 20%; width: 40px; height: 40px; }
        .comic-cluster#main-comic-cluster #hotspot-p2 { top: 10%; left: 20%; width: 40px; height: 40px; }
        .comic-cluster#main-comic-cluster #hotspot-p3 { top: 85%; left: 20%; width: 40px; height: 40px; }
        .comic-cluster#main-comic-cluster #hotspot-p4 { top: 69%; left: 15%; width: 40px; height: 40px; }
        .comic-cluster#main-comic-cluster #hotspot-p5 { top: 83%; left: 29%; width: 40px; height: 40px; }
        .comic-cluster#main-comic-cluster #hotspot-p9 { top: 47%; left: 35%; width: 40px; height: 40px; }
        
        /* Hotspots del segundo cómic */
        .comic-cluster#sub-comic-cluster #hotspot-sub-p1 { top: 50%; left: 76%; width: 40px; height: 40px; }
        .comic-cluster#sub-comic-cluster #hotspot-sub-p2 { top: 85%; left: 30%; width: 40px; height: 40px; }

        /* --- EFECTO DE DESBLOQUEO CRÍTICO --- */
        #unlock-matrix-effect {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(5, 5, 5, 0.95);
            z-index: 4500;
            display: none;
            align-items: center;
            justify-content: center;
            color: #49b6ff;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #49b6ff;
        }
        #unlock-matrix-effect.run-animation {
            display: flex;
            animation: flashOverlay 0.6s linear forwards;
        }

        @keyframes flashOverlay {
            0% { opacity: 0; background-color: rgba(73, 182, 255, 0.2); }
            50% { opacity: 1; background-color: #050505; text-shadow: 0 0 20px #ff4949; color: #ff4949; }
            100% { opacity: 0; }
        }

        /* --- POP-UP MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(3, 3, 3, 0.85);
            z-index: 6000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active { display: flex; }

        .modal-envelope {
            background-color: #fcecd2; 
            border: 2px solid #000000; 
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            max-height: 85vh;
            padding: 0;
            overflow: hidden;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.2s ease-out;
        }

        .modal.active .modal-envelope { transform: scale(1); }

        .modal-content {
            background-color: transparent;
            padding: 22px 18px;
            width: 100%;
            max-height: calc(85vh - 4px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .modal-img {
            width: 100%;
            max-height: 220px;
            border-radius: 0;
            margin-bottom: 18px;
            object-fit: contain;
            background-color: #000000; 
            border-bottom: 2px solid #000000; 
        }

        .modal-text {
            font-family: 'Segoe UI', 'Ubuntu', 'Helvetica Neue', sans-serif;
            font-size: 1.05rem; 
            line-height: 1.4;
            color: #000000; 
            font-weight: 500;
            letter-spacing: -0.2px;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .modal-readmore-btn {
            display: none;
            align-self: flex-start;
            margin-top: 15px;
            background: #000000;
            border: 2px solid #000000;
            color: #fcecd2;
            padding: 6px 14px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }
        .modal-readmore-btn:hover {
            background-color: #333333;
            border-color: #333333;
        }

        .close-btn {
            position: absolute;
            top: 5px; right: 10px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            color: #ffffff; 
            z-index: 10;
            user-select: none;
            text-shadow: 0 0 4px #000; 
        }
        .close-btn:hover {
            color: #ff4949;
        }

        /* --- PANTALLA DE EXPERIENCIA FINAL --- */
        #final-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            z-index: 7000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease, visibility 1.5s;
            padding: 25px;
        }

        #final-screen.active { opacity: 1; visibility: visible; }

        .final-screen-logo {
            height: 60px;
            width: auto;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .final-quote {
            max-width: 500px;
            text-align: center;
            font-size: 0.9rem;
            line-height: 1.6;
            letter-spacing: 1px;
            color: #aaa;
            margin: 20px 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 1.2s ease 1s;
        }

        .final-title {
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ff4949;
            margin-bottom: 25px;
            opacity: 0;
            transition: all 1s ease 2.2s;
        }

        #final-screen.active .final-quote, #final-screen.active .final-title { opacity: 1; transform: none; }

        .restart-btn {
            background: transparent;
            border: 1px solid rgba(73, 182, 255, 0.4);
            color: #49b6ff;
            padding: 10px 20px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 2px;
            opacity: 0;
            transition: all 0.3s ease, opacity 1s ease 3.2s;
        }
        #final-screen.active .restart-btn { opacity: 1; }
        .restart-btn:hover { background-color: rgba(73, 182, 255, 0.05); border-color: #49b6ff; }

        .nav-instructions {
            opacity: 0;
            font-size: 0.55rem;
            color: rgba(255,255,255,0.2);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 15px;
            transition: opacity 0.5s ease;
        }

        @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>

    <div id="cover-screen" onclick="unlockSystem()">
        <img class="corporate-logo-img" src="https://i.imgur.com/N7woDah.png" alt="MEMUN Logo">
        <div class="cover-hint">Haz clic para inicializar terminal_</div>
    </div>

    <header class="memun-header">
        <img class="text-logo-img" src="https://i.imgur.com/AJqadud.png" alt="MEMUN">
        <div class="memun-slogan">Memun / editor de memorias</div>
    </header>

    <section id="comic-hub">
        <h2 class="hub-title"></h2>
        <div class="hub-grid">
            <div class="hub-card" style="background-image: url('https://i.imgur.com/tbEc5uM.jpeg');" onclick="enterComic('main')">
                <div class="hub-card-overlay">
                    <div class="hub-card-title">Alice</div>
                </div>
            </div>
            
            <div id="card-luz" class="hub-card" style="background-image: url('https://i.imgur.com/yaTO4vp.jpeg');" onclick="enterComic('sub')">
                <div class="hub-card-overlay">
                    <div class="hub-card-title">Luz</div>
                </div>
            </div>

            <div class="hub-card unclickable-card" style="background-image: url('https://i.imgur.com/xfJhuwW.jpeg');">
                <div class="hub-card-overlay">
                    <div class="hub-card-title">Gael</div>
                </div>
            </div>

            <div class="hub-card unclickable-card" style="background-image: url('https://i.imgur.com/sfsqPZH.jpeg');">
                <div class="hub-card-overlay">
                    <div class="hub-card-title">Mateo</div>
                </div>
            </div>
        </div>
    </section>

    <main class="vn-frame" id="vn-visor">
        
        <div class="identity-tabs-header">
            <button id="btn-tab-alice" class="identity-tab active" onclick="switchCluster('main')">Alice</button>
            <button id="btn-tab-luz" class="identity-tab" onclick="switchCluster('sub')">Luz</button>
            <button class="identity-tab back-hub-tab" onclick="returnToHub()">← Menú</button>
        </div>

        <div class="nav-zone nav-left" onclick="changePage(-1)">
            <span id="arrow-l" class="nav-arrow" style="--dir: -8px;">&#9664;</span>
        </div>
        <div class="nav-zone nav-right" onclick="changePage(1)">
            <span id="arrow-r" class="nav-arrow" style="--dir: 8px;">&#9654;</span>
        </div>

        <div class="book-container">

            <div id="main-comic-cluster" class="comic-cluster active">
                <div class="page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/tbEc5uM.jpeg');"></div>
                    <div class="page-back"></div>
                </div>
                <div class="page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/nPDL1M0.jpeg');">
                        <div id="hotspot-p1" class="interactive-hotspot" 
                             data-text="Tras una guerra devastadora, surgió MEMUN, una corporación tecnológica que prometía eliminar el sufrimiento humano borrando los traumas del conflicto bajo el lema de que 'olvidar era sanar'. Sin embargo, su verdadero propósito era el control absoluto: la empresa trabajó el sistema para modificar identidades, reescribir la historia y borrar cualquier rastro de resistencia pasada, sumiendo a la población en una calma artificial. El plan comenzó a fallar cuando la red central sufrió glitches, provocando que fragmentos de recuerdos reales se filtraran en la mente de personas como Alice, Luz, Gael y Mateo, iniciando el despertar colectivo." 
                             data-img="https://i.imgur.com/ap8Ek0L.png" 
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>

                <div class="page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/6oKaSbZ.jpeg');">
                        <div id="hotspot-p2" class="interactive-hotspot" 
                             data-text="Con cada persona que MEMUN borraba, también desaparecían los lazos que la unían al mundo. Padres olvidaban a sus hijos y familias enteras eran reescritas. Miles de niños quedaron solos, sin registros, sin hogar y sin nadie que recordara que alguna vez habían sido amados. Muchos terminaron viviendo en las calles, sobreviviendo entre ruinas and recuerdos fragmentados. Eran las víctimas más silenciosas de MEMUN: niños que habían perdido a sus familias sin que nadie hubiera muerto." 
                             data-img="https://i.imgur.com/18bRNAv.png" 
                             onclick="openHotspot(this)">
                        </div>
                         <div id="hotspot-p9" class="interactive-hotspot" 
                             data-text="Marta es uno de los pilares de la resistencia oculta contra el control absoluto de MEMUN. Mientras la corporación utiliza discursos manipuladores para obligar a las comunidades a olvidar su pasado, Marta se dedica activamente a rastrear las anomalías y mentiras del sistema. Con su teléfono celular como herramienta de investigación y comunicación clandestina, se encarga de alertar a otros sobrevivientes sobre los datos borrados y la manipulation de la historia, convirtiéndose en una pieza clave para desmantelar la verdad colectiva que la empresa tecnológica intenta imponer." 
                             data-img="https://i.imgur.com/xsVnNFY.png" 
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>

                <div class="page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/XI2jwWL.png');">
                        <div id="hotspot-p3" class="interactive-hotspot" 
                             data-text="Las furgonetas de MEMUN aparecían sin aviso, generalmente durante la noche. No llevaban insignias oficiales, pero todos sabían lo que significaban. Cuando una persona era señalada para ser borrada, los agentes llegaron en silencio, la subían al vehículo y desaparecían. Días después, los registros cambiaban, las fotografías se ponían borrosas y los recuerdos se desvanecían. Era como si esa persona nunca hubiera existido." 
                             data-img="https://i.imgur.com/g9mMY0x.png" 
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>
                
                <div class="page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/CYjEKWu.jpeg');">
                        <div id="hotspot-p4" class="interactive-hotspot" 
                             data-action="bridge-sub-comic"
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>

                <div class="page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/e3pOSvq.jpeg');">
                        <div id="hotspot-p5" class="interactive-hotspot" 
                             data-text="El dragón rojo fue un regalo que Alice y Otávio le dieron a Alex cuando era pequeño. Para él, el dragón era su refugio: lo abrazaba cada noche cuando tenía miedo. Tras la intervención de MEMUN, Alex desapareció de todos los registros y recuerdos del mundo. El dragón fue lo único que quedó atrás, oculto bajo el suelo de la casa. Años después, al encontrarlo, Alice comenzó a recuperar fragmentos de su memoria y entendió la dolorosa verdad." 
                             data-img="https://i.imgur.com/0RmckgB.png"
                             data-wiki="https://gonzalorceccato.github.io/wikimemun/"
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>

                <div class="page">
                    <div class="page-front" style="background-image: url();"></div>
                    <div class="page-back"></div>
                </div>
            </div>

            <div id="sub-comic-cluster" class="comic-cluster">
                <div class="sub-page page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/yaTO4vp.jpeg');">
            
                    </div>
                    <div class="page-back"></div>
                </div>
                <div class="sub-page page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/srLh77Y.jpeg');">
                        <div id="hotspot-sub-p1" class="interactive-hotspot" 
                             data-text="Esa niña de la foto es la propia Luz antes de que el conflicto fracturara su realidad y de que MEMUN borrara de la mente de los sobrevivientes cualquier rastro de la existencia de sus padres. Al observar los rostros sonrientes y notar el detalle del dragón tejido, la fotografía misma se convierte en una ventana silenciosa a una identidad robada; una prueba irrefutable de que los lazos familiares existieron verdaderamente antes del gran olvido."
                             data-img="https://i.imgur.com/TwdZci6.png"
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>

                <div class="sub-page page">
                    <div class="page-front" style="background-image: url('https://i.imgur.com/kKeZBZ7.jpeg');">
                        <div id="hotspot-sub-p2" class="interactive-hotspot" 
                             data-text="La cronología marcada en los calendarios de 2041, 2042 y 2045 revela el avance del 'primer vacío', donde los days se convirtieron en años de ausencias tras el colapso global. La guerra destruyó las ciudades y fracturó la historia humana. El trauma dejó cicatrices tan profundas que la población, desesperada por escapar del horror, aceptó el sistema de la corporación MEMUN, entregando el control de su propia memoria."
                             data-img="https://i.imgur.com/7hrePwH.png"
                             onclick="openHotspot(this)">
                        </div>
                    </div>
                    <div class="page-back"></div>
                </div>
            </div>

        </div>
    </main>

    <footer class="nav-instructions" id="footer-instructions">
        <p>PULSA EN LOS LATERALES IZQUIERDA/DERECHA PARA VOLVER O AVANZAR</p>
    </footer>

    <div id="unlock-matrix-effect">SINCRONIZANDO CONEXIÓN ENTRE PERSONAJES...</div>

    <div id="final-screen">
        <img class="final-screen-logo" src="https://i.imgur.com/AJqadud.png" alt="MEMUN">
        <p class="final-quote">
            "Las memorias pueden ser editadas.<br>
            Las marcas que dejan, no."
        </p>
        <div class="final-title">Fin</div>
        <button class="restart-btn" onclick="restartInvestigation()">Reiniciar investigación</button>
    </div>

    <div id="infoModal" class="modal" onclick="closeModal()">
        <div class="modal-envelope" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="modal-content">
                <img id="modalImg" class="modal-img" src="" alt="Elemento Ampliado">
                <p id="modalText" class="modal-text"></p>
                <a id="modalWikiBtn" class="modal-readmore-btn" target="_blank">Leer más</a>
            </div>
        </div>
    </div>

    <script>
        let currentCluster = "main";
        let mainPageIndex = 0;
        let subPageIndex = 0;
        let isLuzTabUnlocked = false; // Controla la visibilidad de la pestaña de arriba en el visor
        
        let mainPages = Array.from(document.querySelectorAll('#main-comic-cluster .page'));
        let subPages = Array.from(document.querySelectorAll('#sub-comic-cluster .sub-page'));
        
        let inactivityTimer;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playPageFlipSound() {
            initAudio();
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            let oscLow = audioCtx.createOscillator();
            let gainLow = audioCtx.createGain();
            oscLow.type = 'triangle';
            oscLow.frequency.setValueAtTime(90, now);
            oscLow.frequency.exponentialRampToValueAtTime(30, now + 0.35);
            gainLow.gain.setValueAtTime(0.2, now);
            gainLow.gain.linearRampToValueAtTime(0, now + 0.35);
            oscLow.connect(gainLow);
            gainLow.connect(audioCtx.destination);
            oscLow.start(now); oscLow.stop(now + 0.35);
        }

        function playClickSound() {
            initAudio();
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.08);
        }

        function unlockSystem() {
            initAudio();
            const cover = document.getElementById('cover-screen');
            cover.style.opacity = '0';
            setTimeout(() => {
                cover.style.visibility = 'hidden';
                document.body.classList.add('system-ready');
                showComicHub();
            }, 1200);
        }

        function showComicHub() {
            const hub = document.getElementById('comic-hub');
            hub.style.display = 'flex';
            setTimeout(() => {
                hub.style.opacity = '1';
                hub.style.transform = 'none';
            }, 50);
        }

        function enterComic(cluster) {
            playClickSound();
            document.getElementById('comic-hub').style.display = 'none';
            
            const visor = document.getElementById('vn-visor');
            visor.style.display = 'flex';
            document.getElementById('footer-instructions').style.opacity = '1';
            
            setTimeout(() => {
                visor.style.opacity = '1';
                visor.style.transform = 'none';
            }, 50);

            // Al entrar directamente desde el menú principal por "Luz", forzamos que su pestaña superior se active
            if (cluster === 'sub') {
                isLuzTabUnlocked = true;
                document.getElementById('btn-tab-luz').classList.add('unlocked');
            } else {
                // Al entrar por "Alice", verificamos si ya se desbloqueó previamente antes de esconderla
                if (!isLuzTabUnlocked) {
                    document.getElementById('btn-tab-luz').classList.remove('unlocked');
                }
            }

            switchCluster(cluster);
        }

        function returnToHub() {
            playClickSound();
            document.getElementById('vn-visor').style.display = 'none';
            document.getElementById('footer-instructions').style.opacity = '0';
            showComicHub();
        }

        function changePage(direction) {
            if (document.getElementById('final-screen').classList.contains('active')) return;

            if (currentCluster === "main") {
                if (direction === 1 && mainPageIndex < mainPages.length - 1) {
                    playPageFlipSound();
                    mainPages[mainPageIndex].classList.add('flipped');
                    mainPageIndex++;
                    if (mainPageIndex === mainPages.length - 1) {
                        setTimeout(() => {
                            document.getElementById('final-screen').classList.add('active');
                        }, 800);
                    }
                } else if (direction === -1 && mainPageIndex > 0) {
                    playPageFlipSound();
                    mainPageIndex--;
                    mainPages[mainPageIndex].classList.remove('flipped');
                }
            } else {
                if (direction === 1 && subPageIndex < subPages.length - 1) {
                    playPageFlipSound();
                    subPages[subPageIndex].classList.add('flipped');
                    subPageIndex++;
                } else if (direction === -1 && subPageIndex > 0) {
                    playPageFlipSound();
                    subPageIndex--;
                    subPages[subPageIndex].classList.remove('flipped');
                }
            }
            updatePageLayers();
            resetInactivityTimer();
        }

        function updatePageLayers() {
            let activeList = (currentCluster === "main") ? mainPages : subPages;
            let activeIndex = (currentCluster === "main") ? mainPageIndex : subPageIndex;

            let inactiveList = (currentCluster === "main") ? subPages : mainPages;
            inactiveList.forEach(p => p.classList.add('page-hidden'));

            activeList.forEach((p, idx) => {
                if (p.classList.contains('flipped')) {
                    p.style.zIndex = 10 + (activeList.length - idx);
                    p.classList.add('page-hidden');
                } else {
                    p.style.zIndex = activeList.length - idx;
                    if (idx === activeIndex) {
                        p.classList.remove('page-hidden');
                    } else {
                        p.style.zIndex = 0;
                        p.classList.add('page-hidden');
                    }
                }
            });
        }

        function switchCluster(target) {
            currentCluster = target;
            
            document.querySelectorAll('.identity-tab').forEach(btn => btn.classList.remove('active'));
            if (target === "main") {
                document.getElementById('btn-tab-alice').classList.add('active');
                document.getElementById('sub-comic-cluster').classList.remove('active');
                document.getElementById('main-comic-cluster').classList.add('active');
                mainPageIndex = 0;
                mainPages.forEach(p => p.classList.remove('flipped'));
            } else {
                document.getElementById('btn-tab-luz').classList.add('active');
                document.getElementById('main-comic-cluster').classList.remove('active');
                document.getElementById('sub-comic-cluster').classList.add('active');
                subPageIndex = 0;
                subPages.forEach(p => p.classList.remove('flipped'));
            }
            updatePageLayers();
            resetInactivityTimer();
        }

        function openHotspot(element) {
            playClickSound();
            if (element.hasAttribute('data-link')) {
                window.open(element.getAttribute('data-link'), '_blank');
                return;
            }

            if (element.getAttribute('data-action') === 'bridge-sub-comic') {
                const matrix = document.getElementById('unlock-matrix-effect');
                matrix.classList.add('run-animation');
                
                setTimeout(() => {
                    isLuzTabUnlocked = true; // Activa el desbloqueo de la pestaña superior
                    
                    const luzTab = document.getElementById('btn-tab-luz');
                    luzTab.classList.add('unlocked'); // Enciende la aba de arriba

                    switchCluster('sub');
                    matrix.classList.remove('run-animation');
                }, 1500);
                return;
            }

            document.getElementById('modalText').innerText = element.getAttribute('data-text') || '';
            const modalImg = document.getElementById('modalImg');
            const imgSrc = element.getAttribute('data-img');

            if (imgSrc) {
                modalImg.src = imgSrc;
                modalImg.style.display = "inline-block";
            } else {
                modalImg.style.display = "none";
            }

            const wikiUrl = element.getAttribute('data-wiki');
            const wikiBtn = document.getElementById('modalWikiBtn');
            if (wikiUrl) {
                wikiBtn.href = wikiUrl;
                wikiBtn.style.display = "inline-block";
            } else {
                wikiBtn.style.display = "none";
            }

            document.getElementById('infoModal').classList.add('active');
        }

        function closeModal() {
            playClickSound();
            document.getElementById('infoModal').classList.remove('active');
        }

        function restartInvestigation() {
            playClickSound();
            document.getElementById('final-screen').classList.remove('active');
            
            isLuzTabUnlocked = false; 
            document.getElementById('btn-tab-luz').classList.remove('unlocked'); // Apaga la aba al resetear
            
            mainPageIndex = 0;
            subPageIndex = 0;
            mainPages.forEach(p => p.classList.remove('flipped'));
            subPages.forEach(p => p.classList.remove('flipped'));
            returnToHub();
        }

        window.addEventListener('load', () => {
            updatePageLayers();
            resetInactivityTimer();
            ['mousemove', 'mousedown', 'touchstart', 'keydown'].forEach(evt => {
                document.addEventListener(evt, resetInactivityTimer);
            });
        });

        function resetInactivityTimer() {
            hideArrows();
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(showArrows, 5000);
        }

        function showArrows() {
            if(document.getElementById('vn-visor').style.display === 'none') return;
            let index = (currentCluster === "main") ? mainPageIndex : subPageIndex;
            let list = (currentCluster === "main") ? mainPages : subPages;
            
            if (index > 0) document.getElementById('arrow-l').classList.add('show');
            if (index < list.length - 1) document.getElementById('arrow-r').classList.add('show');
        }

        function hideArrows() {
            document.getElementById('arrow-l').classList.remove('show');
            document.getElementById('arrow-r').classList.remove('show');
        }
    </script>
</body>
</html>
